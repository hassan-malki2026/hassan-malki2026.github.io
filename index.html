<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البوابة السياحية | جزر فرسان</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .welcome-card {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 121, 107, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #00796b;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #555;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-report {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00897b, #004d40);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 77, 64, 0.3);
        }

        .btn-report:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 77, 64, 0.4);
            background: linear-gradient(135deg, #00a693, #00695c);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <span class="icon">🏝️</span>
        <h1>مرحباً بك</h1>
        <p>استكشف لؤلؤة البحر الأحمر وتعرف على تاريخ ومعالم جزر فرسان الساحرة.</p>
        
        <a href="Report-farasan.html" class="btn-report">دخول التقرير المفصل</a>
    </div>

</body>
</html>
