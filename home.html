<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسن المالكي | قائد فريق العمل</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --primary: #0077be;
            --primary-dark: #005a8c;
            --accent: #00b4d8;
            --text-dark: #012a3f;
            --text-light: #334b5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1.15rem;
        }

        .leader-card {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            border-radius: 32px;
            padding: 42px 44px;
            box-shadow: 
                0 30px 60px -15px rgb(0 119 190 / 0.15),
                0 10px 25px -5px rgb(0 119 190 / 0.08),
                inset 0 2px 0 rgba(255,255,255,0.95);
            border: 1px solid rgba(0, 119, 190, 0.18);
            gap: 38px;
            position: relative;
            overflow: hidden;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .leader-card::before {
            content: "";
            position: absolute;
            top: -90px;
            left: -90px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.14) 0%, transparent 65%);
            border-radius: 50%;
            z-index: 0;
        }

        .leader-card:hover {
            transform: translateY(-12px);
            box-shadow: 
                0 45px 90px -12px rgb(0 119 190 / 0.22),
                0 18px 40px -8px rgb(0 119 190 / 0.15);
        }

        /* صورة القائد */
        .leader-image-container {
            flex: 0 0 170px;
            height: 170px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            border: 8px solid #ffffff;
            box-shadow: 
                0 12px 35px rgba(0, 105, 165, 0.28),
                0 0 0 10px rgba(0, 160, 210, 0.2);
            transition: all 0.5s ease;
        }

        .leader-card:hover .leader-image-container {
            transform: scale(1.05) rotate(3deg);
            box-shadow: 
                0 18px 48px rgba(0, 130, 200, 0.38),
                0 0 0 12px rgba(0, 180, 220, 0.25);
        }

        .leader-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .verified-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: linear-gradient(135deg, #00b4d8, #0077be);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            border: 4px solid white;
            box-shadow: 0 6px 16px rgba(0,0,0,0.22);
        }

        /* المعلومات */
        .leader-info {
            flex: 1;
            min-width: 280px;
            z-index: 2;
        }

        .leader-info h3 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-dark);
            background: linear-gradient(135deg, #012a3f, #03557a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.7px;
        }

        .role {
            color: var(--primary);
            font-weight: 700;
            margin: 0 0 18px 0;
            font-size: 1rem;
            letter-spacing: 1.4px;
            background: rgba(0, 180, 216, 0.09);
            padding: 8px 20px;
            border-radius: 30px;
            width: fit-content;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .bio {
            color: var(--text-light);
            line-height: 1.8;
            font-size: 1.08rem;
            margin-bottom: 26px;
            font-weight: 500;
        }

        .bio strong {
            color: var(--primary);
        }

        /* زر التواصل */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 15px 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 30px rgba(0, 119, 190, 0.32);
            letter-spacing: 0.5px;
        }

        .contact-btn:hover {
            background: linear-gradient(135deg, var(--primary-dark), #008bb3);
            transform: translateY(-4px);
            box-shadow: 0 20px 38px rgba(0, 119, 190, 0.42);
            gap: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 0.95rem;
        }

        /* الاستجابة للجوال */
        @media (max-width: 720px) {
            .leader-card {
                padding: 32px 28px;
                gap: 28px;
                flex-direction: column;
                text-align: center;
            }
            
            .leader-image-container {
                margin: 0 auto;
                flex: 0 0 160px;
                height: 160px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>حسن المالكي</h1>
            <p>قائد فريق العمل • مصمم ومطور الصفحة</p>
        </div>

        <div class="leader-card">
            <div class="leader-image-container">
                <img src="https://hassan-malki2026.github.io/images/IMG-20260508-WA0162.jpg" 
                     alt="حسن المالكي - قائد فريق العمل" 
                     class="leader-img">
                <div class="verified-badge">✓</div>
            </div>
            
            <div class="leader-info">
                <h3>حسن المالكي</h3>
                <p class="role">✨ قائد فريق العمل</p>
                
                <p class="bio">
                    باحث ومهتم بتوثيق المعالم السياحية والتاريخية لجزيرة فرسان. 
                    <strong>مصمم ومطور هذه الصفحة</strong>، يسعى لإبراز جمال وتاريخ المنطقة للعالم بأسلوب احترافي ومتميز.
                </p>
                
                <button class="contact-btn" onclick="window.location.href='mailto:your@email.com'">
                    <span>📩</span> تواصل معي
                </button>
            </div>
        </div>

        <div class="footer">
            تم تصميم وتطوير هذه الصفحة بواسطة حسن المالكي © ٢٠٢٦
        </div>
    </div>
</body>
</html>
